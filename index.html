<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shubham Mohta | Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
</head>
<body class="galaxy-view">

  <canvas id="bg"></canvas>

  <!-- Fade-to-black overlay for scene transitions -->
  <div id="overlay"></div>

  <!-- ── Galaxy home ── -->
  <div class="home-hero" id="home-hero">
    <p class="home-eyebrow">CS · Astrophysics · Math · UofT</p>
    <h1>Shubham Mohta</h1>
    <p class="home-sub">Building things that work.</p>
    <p class="home-hint">navigate the stars</p>
  </div>

  <!-- Nav star labels (JS positions these each frame) -->
  <div class="star-label" id="label-about"    data-page="about">About</div>
  <div class="star-label" id="label-projects" data-page="projects">Projects</div>
  <div class="star-label" id="label-contact"  data-page="contact">Contact</div>
  <div class="star-label" id="label-resume"   data-page="resume">Résumé</div>

  <!-- ── Stellar system HUD ── -->
  <button class="stellar-back" id="stellar-back">← galaxy</button>
  <p class="stellar-title"    id="stellar-title"></p>
  <p class="stellar-hint">click a planet to explore</p>

  <!-- Planet labels (created dynamically by JS) -->
  <div id="planet-labels"></div>

  <!-- ── Planet detail bottom sheet ── -->
  <div class="planet-sheet" id="planet-sheet">
    <div class="planet-sheet-inner">
      <button class="sheet-close" id="sheet-close">✕</button>
      <div id="sheet-content"></div>
    </div>
  </div>

  <!-- ── PDF viewer modal ── -->
  <div id="pdf-modal">
    <div class="pdf-modal-bar">
      <span>Résumé</span>
      <button id="pdf-close">✕</button>
    </div>
    <iframe id="pdf-frame" src="" title="Résumé PDF"></iframe>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
